{% extends 'base.html' %}
{% block title %}{{ title }} — REDS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:500px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Code <span class="text-danger">*</span></label>
                    <input type="text" name="code" class="form-control"
                           value="{{ account.code|default:'' }}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Type <span class="text-danger">*</span></label>
                    <select name="type" class="form-select" required>
                        <option value="">— Select —</option>
                        {% for val, label in type_choices %}
                        <option value="{{ val }}"
                            {% if account and account.type == val %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control"
                           value="{{ account.name|default:'' }}" required>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control"
                              rows="2">{{ account.description|default:'' }}</textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% url 'accounting:account_list' %}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
