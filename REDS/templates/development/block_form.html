{% extends 'base.html' %}
{% block title %}{{ title }} — REDS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-12">
                    <label class="form-label fw-semibold">Town <span class="text-danger">*</span></label>
                    <select name="town" class="form-select" required>
                        <option value="">— Select Town —</option>
                        {% for t in towns %}
                        <option value="{{ t.pk }}"
                            {% if block and block.town.pk == t.pk %}selected{% endif %}>
                            {{ t.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Block Name (English) <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control"
                           value="{{ block.name|default:'' }}"
                           placeholder="e.g. A, B, C or Block A" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Block Name (Urdu)</label>
                    <input type="text" name="name_urdu" class="form-control"
                           value="{{ block.name_urdu|default:'' }}"
                           dir="rtl" style="font-family: 'Jameel Noori Nastaleeq', serif;">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Total Plots (planned)</label>
                    <input type="number" name="total_plots" class="form-control"
                           value="{{ block.total_plots|default:'0' }}" min="0">
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control"
                              rows="2">{{ block.description|default:'' }}</textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% url 'development:block_list' %}" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
