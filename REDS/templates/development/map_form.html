{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-map"></i> {{ title }}</h4>
    <a href="{% url 'development:map_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-bold">Town <span class="text-danger">*</span></label>
                    <select name="town" class="form-select" required id="townSelect">
                        <option value="">— Select Town —</option>
                        {% for t in towns %}
                        <option value="{{ t.pk }}">{{ t.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Block</label>
                    <select name="block" class="form-select" id="blockSelect">
                        <option value="">— Master Plan (No Block) —</option>
                        {% for b in blocks %}
                        <option value="{{ b.pk }}" data-town="{{ b.town.pk }}">
                            {{ b.town.name }} — {{ b.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <div class="form-text">Leave empty for town master plan</div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" required
                           placeholder="e.g. Master Plan, Block A Layout">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">Map Type <span class="text-danger">*</span></label>
                    <select name="map_type" class="form-select" id="mapType">
                        <option value="IMAGE">Image (JPG/PNG)</option>
                        <option value="PDF">PDF</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">Display Order</label>
                    <input type="number" name="display_order" class="form-control" value="0" min="0">
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold">Map File <span class="text-danger">*</span></label>
                    <input type="file" name="map_file" class="form-control" required
                           id="mapFile" accept="image/*,.pdf">
                    <div class="form-text" id="fileHelp">
                        Accepted: JPG, PNG, GIF for images — PDF for documents
                    </div>
                </div>

                <!-- Image Preview -->
                <div class="col-md-12" id="previewBox" style="display:none;">
                    <label class="form-label fw-bold">Preview</label>
                    <div class="border rounded p-2 text-center bg-light">
                        <img id="imagePreview" src="#" alt="Preview"
                             style="max-height:300px; max-width:100%;">
                    </div>
                </div>

            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-cloud-upload"></i> Upload Map
                </button>
                <a href="{% url 'development:map_list' %}" class="btn btn-outline-secondary ms-2">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Filter blocks by selected town
document.getElementById('townSelect').addEventListener('change', function() {
    const townId = this.value;
    const blockSelect = document.getElementById('blockSelect');
    const options = blockSelect.querySelectorAll('option');
    options.forEach(opt => {
        if (!opt.value) return;
        opt.style.display = opt.dataset.town === townId ? '' : 'none';
    });
    blockSelect.value = '';
});

// Image preview
document.getElementById('mapFile').addEventListener('change', function() {
    const file = this.files[0];
    const mapType = document.getElementById('mapType').value;
    if (file && mapType === 'IMAGE') {
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('previewBox').style.display = 'block';
        };
        reader.readAsDataURL(file);
    } else {
        document.getElementById('previewBox').style.display = 'none';
    }
});
</script>
{% endblock %}
