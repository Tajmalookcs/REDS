{% extends 'base.html' %}
{% block title %}Edit Booking #{{ booking.pk }} — REDS{% endblock %}
{% block page_title %}Edit Booking #{{ booking.pk }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-12">
                    <label class="form-label fw-semibold">Agent</label>
                    <select name="agent" class="form-select">
                        <option value="">— No Agent —</option>
                        {% for a in agents %}
                        <option value="{{ a.pk }}"
                            {% if booking.agent and booking.agent.pk == a.pk %}selected{% endif %}>
                            {{ a.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Status</label>
                    <select name="status" class="form-select">
                        {% for val, label in booking.STATUS_CHOICES %}
                        <option value="{{ val }}"
                            {% if booking.status == val %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Notes</label>
                    <textarea name="notes" class="form-control"
                              rows="3">{{ booking.notes }}</textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% url 'sales:booking_detail' booking.pk %}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
