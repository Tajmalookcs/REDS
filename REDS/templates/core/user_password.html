{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">
        <i class="bi bi-key"></i> Change Password — <span class="text-danger">{{ user_obj.username }}</span>
    </h4>
    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Users
    </a>
</div>

<div class="card" style="max-width: 480px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">New Password <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" required minlength="6">
                <div class="form-text">Minimum 6 characters.</div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Confirm Password <span class="text-danger">*</span></label>
                <input type="password" name="confirm" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning px-4">
                    <i class="bi bi-key"></i> Change Password
                </button>
                <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
