{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-person-gear"></i> {{ title }}</h4>
    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-bold">Username <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control" required
                           value="{{ user_obj.username|default:post.username|default:'' }}"
                           {% if user_obj %}readonly{% endif %}>
                    {% if user_obj %}
                    <div class="form-text">Username cannot be changed.</div>
                    {% endif %}
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="full_name" class="form-control"
                           value="{{ user_obj.full_name|default:post.full_name|default:'' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Role <span class="text-danger">*</span></label>
                    <select name="role" class="form-select" required>
                        <option value="USER"
                            {% if user_obj.role == 'USER' or not user_obj %}selected{% endif %}>
                            User
                        </option>
                        <option value="SUPERUSER"
                            {% if user_obj.role == 'SUPERUSER' %}selected{% endif %}>
                            Superuser
                        </option>
                    </select>
                </div>

                <div class="col-md-6 d-flex align-items-end">
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox"
                               name="is_active" id="isActive"
                               {% if user_obj.is_active or not user_obj %}checked{% endif %}>
                        <label class="form-check-label fw-bold" for="isActive">
                            Active
                        </label>
                    </div>
                </div>

                {% if not user_obj %}
                <div class="col-md-6">
                    <label class="form-label fw-bold">Password <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control" required
                           minlength="6">
                    <div class="form-text">Minimum 6 characters.</div>
                </div>
                {% endif %}

            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-lg"></i>
                    {% if user_obj %}Update User{% else %}Create User{% endif %}
                </button>
                <a href="{% url 'user_list' %}" class="btn btn-outline-secondary ms-2">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
