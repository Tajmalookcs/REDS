{% extends 'base.html' %}
{% block title %}New Booking — REDS{% endblock %}
{% block page_title %}New Booking{% endblock %}

{% block content %}
<div class="card" style="max-width:820px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <!-- ── CUSTOMER ─────────────────────── -->
                <div class="col-12">
                    <label class="form-label fw-semibold">Customer</label>
                    <div class="d-flex gap-3 mb-2">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="customer_mode"
                                   id="modeExisting" value="existing" checked
                                   onchange="toggleCustomerMode('existing')">
                            <label class="form-check-label" for="modeExisting">
                                Existing Customer
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="customer_mode"
                                   id="modeNew" value="new"
                                   onchange="toggleCustomerMode('new')">
                            <label class="form-check-label" for="modeNew">
                                New Customer
                            </label>
                        </div>
                    </div>

                    <!-- Existing dropdown -->
                    <div id="existingCustomer">
                        <select name="customer" class="form-select">
                            <option value="">— Select Customer —</option>
                            {% for c in customers %}
                            <option value="{{ c.pk }}">{{ c.name }} ({{ c.phone }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- New customer inline fields -->
                    <div id="newCustomer" class="d-none">
                        <div class="card bg-light border-0 p-3">
                            <div class="row g-2">
                                <div class="col-md-6">
                                    <label class="form-label">
                                        Full Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" name="new_name" class="form-control"
                                           placeholder="Full name">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">
                                        Contact <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" name="new_contact" class="form-control"
                                           placeholder="Phone number">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">
                                        CNIC <span class="text-muted small">(optional)</span>
                                    </label>
                                    <input type="text" name="new_cnic" class="form-control"
                                           placeholder="00000-0000000-0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">
                                        City <span class="text-muted small">(optional)</span>
                                    </label>
                                    <input type="text" name="new_city" class="form-control"
                                           placeholder="City">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">
                                        Address <span class="text-muted small">(optional)</span>
                                    </label>
                                    <input type="text" name="new_address" class="form-control"
                                           placeholder="Address">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── PLOT ──────────────────────────── -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        Plot <span class="text-danger">*</span>
                    </label>
                    <select name="plot" class="form-select" id="plotSelect"
                            onchange="fillPrice()" required>
                        <option value="">— Select Available Plot —</option>
                        {% for p in plots %}
                        <option value="{{ p.pk }}" data-price="{{ p.price }}">
                            {{ p.block.town.name }} / {{ p.block.name }}
                            — Plot {{ p.plot_no }} ({{ p.size }} {{ p.size_unit }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- ── BOOKING DATE ───────────────────── -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        Booking Date <span class="text-danger">*</span>
                    </label>
                    <input type="date" name="booking_date" class="form-control"
                           value="{% now 'Y-m-d' %}" required>
                </div>

                <!-- ── AGENT ─────────────────────────── -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Agent (optional)</label>
                    <select name="agent" class="form-select"
                            onchange="toggleCommission()">
                        <option value="">— No Agent —</option>
                        {% for a in agents %}
                        <option value="{{ a.pk }}">{{ a.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- ── COMMISSION ─────────────────────── -->
                <div class="col-md-6" id="commissionField" style="display:none;">
                    <label class="form-label fw-semibold">Commission Rate (%)</label>
                    <input type="number" name="commission_rate" class="form-control"
                           step="0.01" value="0">
                </div>

                <!-- ── PRICING ───────────────────────── -->
                <div class="col-md-4">
                    <label class="form-label fw-semibold">
                        Total Price (Rs.) <span class="text-danger">*</span>
                    </label>
                    <input type="number" name="total_price" id="totalPrice"
                           class="form-control" step="0.01"
                           oninput="calcNet()" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Discount (Rs.)</label>
                    <input type="number" name="discount" id="discount"
                           class="form-control" step="0.01" value="0"
                           oninput="calcNet()">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Net Price (Rs.)</label>
                    <input type="number" name="net_price" id="netPrice"
                           class="form-control" step="0.01" readonly>
                </div>

                <!-- ── DOWN PAYMENT ───────────────────── -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Down Payment (Rs.)</label>
                    <input type="number" name="down_payment" class="form-control"
                           step="0.01" value="0">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Payment Mode</label>
                    <select name="payment_mode" class="form-select">
                        <option value="CASH">Cash</option>
                        <option value="BANK">Bank Transfer</option>
                        <option value="CHEQUE">Cheque</option>
                    </select>
                </div>

                <!-- ── FIRST INSTALLMENT ──────────────── -->
                <div class="col-12">
                    <hr class="my-1">
                    <div class="text-muted small mb-2 fw-semibold">
                        First Installment <span class="text-muted">(optional)</span>
                    </div>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">Due Date</label>
                            <input type="date" name="inst_date" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Amount (Rs.)</label>
                            <input type="number" name="inst_amount" class="form-control"
                                   step="0.01" placeholder="0">
                        </div>
                    </div>
                </div>

                <!-- ── NOTES ─────────────────────────── -->
                <div class="col-12">
                    <label class="form-label fw-semibold">Notes</label>
                    <textarea name="notes" class="form-control" rows="2"></textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>Create Booking
                </button>
                <a href="{% url 'sales:booking_list' %}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleCustomerMode(mode) {
    document.getElementById('existingCustomer').classList.toggle('d-none', mode === 'new');
    document.getElementById('newCustomer').classList.toggle('d-none', mode === 'existing');
}

function fillPrice() {
    const sel   = document.getElementById('plotSelect');
    const price = sel.options[sel.selectedIndex].dataset.price;
    if (price) {
        document.getElementById('totalPrice').value = price;
        calcNet();
    }
}

function calcNet() {
    const total    = parseFloat(document.getElementById('totalPrice').value) || 0;
    const discount = parseFloat(document.getElementById('discount').value)   || 0;
    document.getElementById('netPrice').value = (total - discount).toFixed(2);
}

function toggleCommission() {
    const agent = document.querySelector('[name="agent"]').value;
    document.getElementById('commissionField').style.display = agent ? 'block' : 'none';
}
</script>
{% endblock %}
