{% extends 'base.html' %}
{% block title %}{{ title }} — REDS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control"
                           value="{{ customer.name|default:'' }}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Contact <span class="text-danger">*</span></label>
                    <input type="text" name="contact" class="form-control"
                           value="{{ customer.contact|default:'' }}"
                           placeholder="03XX-XXXXXXX" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">CNIC</label>
                    <input type="text" name="cnic" class="form-control"
                           value="{{ customer.cnic|default:'' }}"
                           placeholder="XXXXX-XXXXXXX-X">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">City</label>
                    <input type="text" name="city" class="form-control"
                           value="{{ customer.city|default:'' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ customer.email|default:'' }}">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Name (Urdu)</label>
                    <input type="text" name="name_urdu" class="form-control"
                           value="{{ customer.name_urdu|default:'' }}"
                           dir="rtl" style="font-family: 'Jameel Noori Nastaleeq', serif;">
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Address</label>
                    <textarea name="address" class="form-control"
                              rows="2">{{ customer.address|default:'' }}</textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% url 'customers:customer_list' %}" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
