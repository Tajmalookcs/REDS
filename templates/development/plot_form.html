{% extends 'base.html' %}
{% block title %}{{ title }} — REDS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:650px;">
    <div class="card-body">
        <form method="POST" id="plotForm">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-12">
                    <label class="form-label fw-semibold">Block <span class="text-danger">*</span></label>
                    <select name="block" id="blockSelect" class="form-select" required
                            onchange="triggerAvailabilityCheck()">
                        <option value="">— Select Block —</option>
                        {% for b in blocks %}
                        <option value="{{ b.pk }}"
                            {% if plot and plot.block.pk == b.pk %}selected{% endif %}>
                            {{ b.town.name }} — Block {{ b.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Plot No <span class="text-danger">*</span></label>
                    <input type="text" name="plot_no" id="plotNoInput" class="form-control"
                           value="{{ plot.plot_no|default:'' }}"
                           placeholder="e.g. 101, A-5" required
                           oninput="triggerAvailabilityCheck()">

                    <!-- Availability status indicator -->
                    <div id="availabilityMsg" class="mt-2" style="display:none;"></div>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Size <span class="text-danger">*</span></label>
                    <input type="number" name="size" id="sizeInput" class="form-control"
                           value="{{ plot.size|default:'' }}"
                           step="0.01" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Unit</label>
                    <select name="size_unit" id="sizeUnitSelect" class="form-select">
                        <option value="MARLA" {% if not plot or plot.size_unit == 'MARLA' %}selected{% endif %}>Marla</option>
                        <option value="KANAL" {% if plot and plot.size_unit == 'KANAL' %}selected{% endif %}>Kanal</option>
                        <option value="SQFT"  {% if plot and plot.size_unit == 'SQFT'  %}selected{% endif %}>Sq Ft</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Plot Type</label>
                    <select name="plot_type" id="plotTypeSelect" class="form-select">
                        <option value="RESIDENTIAL" {% if not plot or plot.plot_type == 'RESIDENTIAL' %}selected{% endif %}>Residential</option>
                        <option value="COMMERCIAL"  {% if plot and plot.plot_type == 'COMMERCIAL'  %}selected{% endif %}>Commercial</option>
                        <option value="CORNER"      {% if plot and plot.plot_type == 'CORNER'      %}selected{% endif %}>Corner</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Price (Rs.) <span class="text-danger">*</span></label>
                    <input type="number" name="price" id="priceInput" class="form-control"
                           value="{{ plot.price|default:'' }}"
                           step="0.01" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Status</label>
                    <select name="status" id="statusSelect" class="form-select">
                        <option value="AVAILABLE"  {% if not plot or plot.status == 'AVAILABLE'  %}selected{% endif %}>Available</option>
                        <option value="HOLD"        {% if plot and plot.status == 'HOLD'        %}selected{% endif %}>Hold</option>
                        <option value="BOOKED"      {% if plot and plot.status == 'BOOKED'      %}selected{% endif %}>Booked</option>
                        <option value="SOLD"        {% if plot and plot.status == 'SOLD'        %}selected{% endif %}>Sold</option>
                        <option value="CANCELLED"   {% if plot and plot.status == 'CANCELLED'   %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Notes</label>
                    <textarea name="notes" class="form-control"
                              rows="2">{{ plot.notes|default:'' }}</textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" id="saveBtn" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% url 'development:plot_list' %}" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const CHECK_URL = "{% url 'development:check_plot_availability' %}";
const EDIT_PK   = "{{ plot.pk|default:'' }}";

let checkTimer = null;

function triggerAvailabilityCheck() {
    clearTimeout(checkTimer);
    const plotNo  = document.getElementById('plotNoInput').value.trim();
    const blockId = document.getElementById('blockSelect').value;

    if (!plotNo || !blockId) {
        hideMsg();
        enableSave();
        return;
    }

    showChecking();

    checkTimer = setTimeout(() => {
        const params = new URLSearchParams({ plot_no: plotNo, block_id: blockId });
        if (EDIT_PK) params.append('plot_pk', EDIT_PK);

        fetch(CHECK_URL + '?' + params.toString())
            .then(r => r.json())
            .then(data => {
                if (!data.available) {
                    showDuplicate(data.plot);
                } else {
                    showAvailable();
                    enableSave();
                }
            })
            .catch(() => {
                hideMsg();
                enableSave();
            });
    }, 400);
}

function showChecking() {
    const msg = document.getElementById('availabilityMsg');
    msg.style.display = 'block';
    msg.innerHTML = `
        <div class="d-flex align-items-center gap-2 text-muted small">
            <div class="spinner-border spinner-border-sm"></div>
            <span>Checking availability…</span>
        </div>`;
}

function showAvailable() {
    const msg = document.getElementById('availabilityMsg');
    msg.style.display = 'block';
    msg.innerHTML = `
        <div class="alert alert-success py-2 px-3 mb-0 small">
            <i class="bi bi-check-circle-fill me-1"></i>
            Plot number is available.
        </div>`;
}

function showDuplicate(plot) {
    const msg = document.getElementById('availabilityMsg');
    msg.style.display = 'block';
    msg.innerHTML = `
        <div class="alert alert-danger py-2 px-3 mb-0 small">
            <div class="fw-bold mb-1">
                <i class="bi bi-x-circle-fill me-1"></i>
                Plot <strong>${plot.plot_no}</strong> already exists in this block.
            </div>
            <div class="mt-1" style="line-height:1.8;">
                <span class="badge bg-secondary me-1">Block: ${plot.block}</span>
                <span class="badge bg-secondary me-1">Town: ${plot.town}</span>
                <span class="badge bg-secondary me-1">Size: ${plot.size} ${plot.size_unit}</span>
                <span class="badge bg-secondary me-1">Type: ${plot.plot_type}</span>
                <span class="badge bg-secondary me-1">Price: Rs. ${Number(plot.price).toLocaleString()}</span>
                <span class="badge ${statusBadgeClass(plot.status)} me-1">${plot.status}</span>
            </div>
        </div>`;

    // Prefill fields from existing plot
    document.getElementById('sizeInput').value      = plot.size;
    document.getElementById('priceInput').value     = plot.price;

    const sizeUnit   = document.getElementById('sizeUnitSelect');
    const plotType   = document.getElementById('plotTypeSelect');
    const statusSel  = document.getElementById('statusSelect');

    for (let opt of sizeUnit.options)  opt.selected = (opt.value === plot.size_unit);
    for (let opt of plotType.options)  opt.selected = (opt.value === plot.plot_type.toUpperCase().replace(' ','_'));
    for (let opt of statusSel.options) opt.selected = (opt.value === plot.status);

    disableSave();
}

function hideMsg() {
    const msg = document.getElementById('availabilityMsg');
    msg.style.display = 'none';
    msg.innerHTML = '';
}

function disableSave() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-x-circle"></i> Plot Already Exists';
    btn.classList.replace('btn-primary', 'btn-secondary');
}

function enableSave() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-save"></i> Save';
    btn.classList.replace('btn-secondary', 'btn-primary');
}

function statusBadgeClass(status) {
    return {
        'AVAILABLE': 'bg-success',
        'BOOKED':    'bg-warning text-dark',
        'SOLD':      'bg-danger',
        'HOLD':      'bg-secondary',
        'CANCELLED': 'bg-dark',
    }[status] || 'bg-secondary';
}

// Run on page load for edit mode (pre-filled values)
document.addEventListener('DOMContentLoaded', () => {
    const plotNo  = document.getElementById('plotNoInput').value.trim();
    const blockId = document.getElementById('blockSelect').value;
    if (plotNo && blockId) triggerAvailabilityCheck();
});
</script>
{% endblock %}
