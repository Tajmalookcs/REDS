{% extends 'base.html' %}
{% block title %}{{ title }} — REDS{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:650px;">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-12">
                    <label class="form-label fw-semibold">Block <span class="text-danger">*</span></label>
                    <select name="block" class="form-select" required>
                        <option value="">— Select Block —</option>
                        {% for b in blocks %}
                        <option value="{{ b.pk }}"
                            {% if plot and plot.block.pk == b.pk %}selected{% endif %}>
                            {{ b.town.name }} — Block {{ b.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Plot No <span class="text-danger">*</span></label>
                    <input type="text" name="plot_no" class="form-control"
                           value="{{ plot.plot_no|default:'' }}"
                           placeholder="e.g. 101, A-5" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Size <span class="text-danger">*</span></label>
                    <input type="number" name="size" class="form-control"
                           value="{{ plot.size|default:'' }}"
                           step="0.01" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Unit</label>
                    <select name="size_unit" class="form-select">
                        <option value="MARLA" {% if not plot or plot.size_unit == 'MARLA' %}selected{% endif %}>Marla</option>
                        <option value="KANAL" {% if plot and plot.size_unit == 'KANAL' %}selected{% endif %}>Kanal</option>
                        <option value="SQFT"  {% if plot and plot.size_unit == 'SQFT'  %}selected{% endif %}>Sq Ft</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Plot Type</label>
                    <select name="plot_type" class="form-select">
                        <option value="RESIDENTIAL" {% if not plot or plot.plot_type == 'RESIDENTIAL' %}selected{% endif %}>Residential</option>
                        <option value="COMMERCIAL"  {% if plot and plot.plot_type == 'COMMERCIAL'  %}selected{% endif %}>Commercial</option>
                        <option value="CORNER"      {% if plot and plot.plot_type == 'CORNER'      %}selected{% endif %}>Corner</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Price (Rs.) <span class="text-danger">*</span></label>
                    <input type="number" name="price" class="form-control"
                           value="{{ plot.price|default:'' }}"
                           step="0.01" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Status</label>
                    <select name="status" class="form-select">
                        <option value="AVAILABLE"  {% if not plot or plot.status == 'AVAILABLE'  %}selected{% endif %}>Available</option>
                        <option value="HOLD"        {% if plot and plot.status == 'HOLD'        %}selected{% endif %}>Hold</option>
                        <option value="BOOKED"      {% if plot and plot.status == 'BOOKED'      %}selected{% endif %}>Booked</option>
                        <option value="SOLD"        {% if plot and plot.status == 'SOLD'        %}selected{% endif %}>Sold</option>
                        <option value="CANCELLED"   {% if plot and plot.status == 'CANCELLED'   %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Notes</label>
                    <textarea name="notes" class="form-control"
                              rows="2">{{ plot.notes|default:'' }}</textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% url 'development:plot_list' %}" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
